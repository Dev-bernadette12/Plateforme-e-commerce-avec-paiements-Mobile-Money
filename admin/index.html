<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - MobileMoney Shop</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .login-header {
            background: linear-gradient(135deg, #1a1f2e, #2c3e50);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }
        
        .login-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: white;
            border-radius: 50% 50% 0 0;
        }
        
        .login-header i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #28a745;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 2rem;
        }
        
        .login-header p {
            opacity: 0.8;
            margin: 0;
            font-size: 0.95rem;
        }
        
        .login-body {
            padding: 50px 40px 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        
        .input-group {
            border: 2px solid #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            background: white;
        }
        
        .input-group:focus-within {
            border-color: #28a745;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.1);
        }
        
        .input-group-text {
            background: #f8f9fa;
            border: none;
            color: #6c757d;
            padding: 0 20px;
            font-size: 1rem;
        }
        
        .form-control {
            border: none;
            padding: 15px 20px;
            font-size: 1rem;
            background: transparent;
        }
        
        .form-control:focus {
            outline: none;
            box-shadow: none;
            background: transparent;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(40, 167, 69, 0.4);
        }
        
        .info-box {
            background: #e8f4fd;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            border-left: 4px solid #0d6efd;
        }
        
        .info-box p {
            margin: 0;
            color: #0369a1;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-box i {
            font-size: 1.2rem;
        }
        
        .demo-credentials {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px dashed #28a745;
        }
        
        .demo-credentials p {
            margin-bottom: 8px;
            color: #495057;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .demo-credentials strong {
            color: #28a745;
            font-size: 1.1rem;
        }
        
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .back-link a {
            color: #6c757d;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        
        .back-link a:hover {
            color: #28a745;
            transform: translateX(-5px);
        }
        
        @media (max-width: 480px) {
            .login-body {
                padding: 30px 20px;
            }
            
            .login-header {
                padding: 30px 20px;
            }
            
            .login-header i {
                font-size: 3rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-lock"></i>
                <h2>Administration</h2>
                <p>Espace réservé au personnel</p>
            </div>
            
            <div class="login-body">
                <form id="loginForm" onsubmit="return false;">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user text-success"></i>
                            Identifiant
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" class="form-control" id="username" value="admin" readonly>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-key text-success"></i>
                            Mot de passe
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" value="admin123" readonly>
                        </div>
                    </div>
                    
                    <button type="button" class="btn-login" onclick="seConnecter()">
                        <i class="fas fa-sign-in-alt"></i>
                        Se connecter
                    </button>
                </form>
                
                <div class="info-box">
                    <p>
                        <i class="fas fa-shield-alt text-primary"></i>
                        <span><strong>Accès sécurisé</strong> - Cette zone est protégée</span>
                    </p>
                </div>
                
                <div class="demo-credentials">
                    <p><i class="fas fa-info-circle text-info"></i> Identifiants de démonstration :</p>
                    <p class="mb-1"><strong>Utilisateur :</strong> <code>admin</code></p>
                    <p><strong>Mot de passe :</strong> <code>admin123</code></p>
                </div>
                
                <div class="back-link">
                    <a href="../index.html">
                        <i class="fas fa-arrow-left"></i>
                        Retour à la boutique
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function seConnecter() {
            // Simulation de connexion
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
